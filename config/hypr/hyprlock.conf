# ~/.config/hypr/hyprlock.conf
source = ~/.cache/matugen/colors-hyprlock.conf

background {
    monitor =
    path = $wallpaper_path
    blur_passes = 2 # 增加一点模糊感，更有氛围
    color = $background
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

# 小时 (Hours)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +%H)"
    color = $accent
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 160
    halign = center
    valign = center
}

# 分钟 (Minutes)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +%M)"
    color = $foreground
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 0
    halign = center
    valign = center
}

# 日期 (Date)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $text
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}

# 用户名 (User with Icon)
label {
    monitor =
    text =   $USER
    color = $foreground
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -220
    halign = center
    valign = center
}

# 输入框 (Input Field)
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(220, 199, 170, 0.2)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    placeholder_text = <i>Type Password</i>
    hide_input = false
    position = 0, -300
    halign = center
    valign = center
}
