# picom config for the dwm session.
# Independent from picom.conf (used by i3). picom v13 syntax.
# Launched from ~/.xinitrc: picom --config ~/.config/picom/picom-dwm.conf

#################################
#            Shadows            #
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;

#################################
#             Fading            #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
#   Transparency / Opacity      #
#################################
frame-opacity = 1.0;

#################################
#           Corners             #
#################################
corner-radius = 0;

#################################
#       General Settings        #
#################################
# glx backend + vsync to avoid screen tearing on the laptop panel.
backend = "glx";
vsync = true;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

#################################
#       Rule-based Options      #
#################################
rules: (
  # dwm draws its own bar via the X root window (window_type = desktop):
  # no shadow / no blur there.
  {
    match = "window_type = 'desktop'";
    shadow = false;
    blur-background = false;
  },
  {
    match = "window_type = 'dock' || _GTK_FRAME_EXTENTS@";
    shadow = false;
    blur-background = false;
  },
  {
    match = "window_type = 'tooltip'";
    shadow = true;
    fade = false;
    full-shadow = false;
  },
  {
    match = "window_type *= 'menu'";
    shadow = false;
  },
  # Unmapped/utility windows without a name (e.g. dwm internals).
  {
    match = "! name~=''";
    shadow = false;
  }
)
